<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>협동 디펜스 - 싱글 플레이</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; color: white; font-family: 'Malgun Gothic', sans-serif; }
        
        #lobby { background: #222; padding: 30px; border-radius: 15px; border: 2px solid #555; width: 600px; max-width: 90%; text-align: center; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 200; overflow-y: auto; max-height: 95vh; }
        h1 { margin: 0 0 10px 0; color: #69f0ae; text-shadow: 0 0 10px rgba(105,240,174,0.5); }
        
        /* ★ 내 정보 패널 (유물 및 재화 표시) */
        #profilePanel { background: #111; border: 1px solid #ffeb3b; border-radius: 8px; padding: 15px; text-align: left; font-size: 14px; }
        .profile-title { font-weight: bold; color: #ffeb3b; font-size: 16px; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .relic-badge { display: inline-block; background: #333; padding: 5px 8px; border-radius: 5px; border: 1px solid #555; margin: 3px; font-size: 12px; }

        .input-group { display: flex; flex-direction: column; text-align: left; gap: 5px; }
        label { font-weight: bold; color: #aaa; font-size: 14px; }
        select, input { padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #555; outline: none; background-color: #333; color: white; cursor: pointer; font-weight: bold; }
        
        #stageInfoPanel { background: #1a1a1a; border: 1px solid #444; border-radius: 8px; padding: 15px; text-align: left; font-size: 14px; color: #ddd; min-height: 100px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .info-title { color: #4fc3f7; font-weight: bold; margin-bottom: 5px; font-size: 18px; }
        .info-desc { margin-bottom: 10px; line-height: 1.5; color: #ccc; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .btn-row { display: flex; gap: 10px; }
        button { padding: 15px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; flex: 1; }
        button:hover { filter: brightness(1.2); }
        
        #btnStartSingle { background-color: #4CAF50; color: white; font-size: 18px; }
        #btnGoMulti { background-color: #1565c0; color: white; }
        .btn-system { background-color: #555; color: white; }
        .btn-gacha { background-color: #ff9800; color: white; }
        
        #gameContainer { position: relative; display: none; background-color: #1a1a1a; aspect-ratio: 720 / 1280; height: 100vh; max-width: 100vw; overflow: hidden; margin: 0 auto; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #222; border: 2px solid #9c27b0; border-radius: 15px; padding: 30px; width: 600px; max-width: 90%; color: white; text-align: center; max-height: 80vh; overflow-y: auto; }
        .modal-close { margin-top: 20px; padding: 12px 30px; font-size: 18px; background-color: #f44336; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="lobby">
        <h1>🛡️ 디펜스 - 싱글 훈련소</h1>
        
        <div id="profilePanel">
            <div class="profile-title">👤 내 사령관 정보</div>
            <div style="margin-bottom: 10px;">💎 보유 영혼석: <span id="lobbySoulStones" style="color:#ea80fc; font-weight:bold; font-size:18px;">0</span>개</div>
            <div style="color: #aaa; font-size: 12px; margin-bottom: 5px;">📦 보유 유물 목록:</div>
            <div id="lobbyRelicsList">
                </div>
        </div>

        <div class="input-group">
            <select id="stageSelect">
                <option value="1">1. 평화로운 초원 (추천)</option>
                <option value="2">2. 고블린 둥지</option>
                <option value="3">3. 붉은 화산</option>
                <option value="4">4. 메마른 사막</option>
                <option value="5" style="color: #ff5252; font-weight: bold;">[HARD] 5. 심연의 사원</option> 
            </select>
        </div>

        <div id="stageInfoPanel">
            <div class="info-title" id="infoTitle">1. 평화로운 초원</div>
            <div class="info-desc" id="infoDesc">가장 기초적인 방어 훈련을 진행하는 초원입니다.</div>
            <div style="color: #ffeb3b; font-weight: bold;" id="infoReward">🎁 클리어 보상: 영혼석 1배 획득</div>
        </div>

        <div class="btn-group">
            <button id="btnStartSingle">🚀 싱글 플레이 시작</button>
            <div class="btn-row">
                <button id="btnOpenLab" class="btn-system" style="background-color: #9c27b0;">🧪 클래스 연구소</button>
                <button id="btnRelicGacha" class="btn-gacha">💎 유물 뽑기 (50석)</button>
            </div>
            <div class="btn-row">
                <button id="btnOpenCollection" class="btn-system">📖 영웅/유물 도감</button>
                <button id="btnDataManage" class="btn-system">💾 데이터 저장/불러오기</button>
            </div>
            <button id="btnGoMulti" onclick="window.location.href='/multi'">🤝 2인 멀티 코옵 모드 가기</button>
        </div>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="720" height="1280"></canvas>
        
        <div id="gameOverOverlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center;">
            <div class="go-title" style="color: #ff5252; font-size: 50px; font-weight: bold; margin-bottom: 30px; text-shadow: 0 0 20px #ff5252;">GAME OVER</div>
            <div style="font-size: 24px; margin-bottom: 15px;">처치한 몬스터: <span id="goKills" style="color: gold;">0</span>마리</div>
            <div style="font-size: 24px; margin-bottom: 15px;">진행한 웨이브: <span id="goWave" style="color: #4fc3f7;">1</span></div>
            <div style="font-size: 24px; margin-bottom: 15px;">획득한 골드: <span id="goGold" style="color: #ffeb3b;">0</span>G</div>
            <div style="font-size: 24px; margin-bottom: 15px;">획득한 영혼석: <span id="goStones" style="color: #ea80fc;">0</span>개</div>
            <button onclick="window.location.reload()" style="margin-top: 40px; padding: 15px 40px; font-size: 22px; background: #c62828; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold;">로비로 돌아가기</button>
        </div>
    </div>

    <div id="labModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #ea80fc; margin-top: 0;">🧪 클래스 연구소</h2>
            <div id="labList" style="margin-top: 20px; text-align: left;"></div>
            <button class="modal-close" onclick="document.getElementById('labModal').style.display='none'">닫기</button>
        </div>
    </div>

    <div id="collectionModal" class="modal">
        <div class="modal-content" style="text-align: left;">
            <h2 style="color: #4fc3f7; margin-top: 0; text-align: center;">📖 통합 도감</h2>
            <h3 style="color: #ffeb3b; border-bottom: 1px solid #555;">💎 유물 도감</h3>
            <div id="collectionRelics" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;"></div>
            <h3 style="color: #69f0ae; border-bottom: 1px solid #555;">⚔️ 영웅 도감</h3>
            <div id="collectionUnits" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            <div style="text-align: center;"><button class="modal-close" onclick="document.getElementById('collectionModal').style.display='none'">닫기</button></div>
        </div>
    </div>

    <div id="dataModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #fff; margin-top: 0;">💾 데이터 관리</h2>
            <p style="color: #aaa; font-size: 13px;">게임은 매 판 자동 저장되지만, 아래 코드를 복사해두면 언제든 복구할 수 있습니다!</p>
            <textarea id="dataCode" rows="4" style="width: 100%; background: #111; color: #69f0ae; border: 1px solid #555; padding: 10px; margin-bottom: 10px; font-family: monospace;"></textarea>
            <div class="btn-row">
                <button onclick="exportData()" style="background: #1565c0; color: white;">내보내기(코드생성)</button>
                <button onclick="importData()" style="background: #d84315; color: white;">불러오기(코드적용)</button>
            </div>
            
            <div class="btn-row" style="margin-top: 10px;">
                <button onclick="resetData()" style="background: #b71c1c; color: white; border: 1px solid #ff5252;">⚠️ 모든 데이터 초기화</button>
            </div>
            <button class="modal-close" onclick="document.getElementById('dataModal').style.display='none'">닫기</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
